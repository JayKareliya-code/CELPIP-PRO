name: CD

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "apps/api/**"
      - ".github/workflows/cd.yml"

# Only one deployment at a time — cancel in-flight runs on new push
concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: false   # never cancel in-flight deploys; queue them

jobs:
  # ── Build & push Docker image ─────────────────────────────────────────────────
  build-api:
    name: Build API image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # for GitHub Container Registry

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      # ── Set image metadata ──────────────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/celpip-api
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}

      # ── Authenticate to registry ────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & push ────────────────────────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          file:    apps/api/Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          # Cache layers from previous builds to speed up subsequent runs
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Deploy to Staging (develop branch only) ───────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-api]
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Deploy image to staging
        run: |
          echo "Deploying to staging: ${{ needs.build-api.outputs.image_tag }}"
          echo "TODO: wire your staging deployment step here."
          echo "Options:"
          echo "  • AWS ECS: use aws-actions/amazon-ecs-deploy-task-definition"
          echo "  • Fly.io:  flyctl deploy --image ${{ needs.build-api.outputs.image_tag }} --app celpip-staging"
          echo "  • k8s:     kubectl set image deployment/celpip-api api=${{ needs.build-api.outputs.image_tag }} -n staging"

      # Example: uncomment and configure for Fly.io staging app
      # - uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --remote-only --app celpip-api-staging
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}

  # ── Deploy to Production (main branch only, after staging) ───────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-api]
    if: github.ref == 'refs/heads/main'
    environment: production   # requires manual approval in GitHub Environments settings

    steps:
      - name: Deploy image to production
        run: |
          echo "Deploying to production: ${{ needs.build-api.outputs.image_tag }}"
          echo "TODO: wire your production deployment step here."
          echo "Options:"
          echo "  • AWS ECS: use aws-actions/amazon-ecs-deploy-task-definition"
          echo "  • Fly.io:  flyctl deploy --image ${{ needs.build-api.outputs.image_tag }}"
          echo "  • k8s:     kubectl set image deployment/celpip-api api=${{ needs.build-api.outputs.image_tag }}"

      # Example: uncomment and configure for Fly.io
      # - uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --remote-only
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
