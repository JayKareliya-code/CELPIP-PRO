name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

defaults:
  run:
    working-directory: apps/api

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff
        run: ruff check app/

  # ── Type check ────────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt mypy types-redis

      - name: Run mypy
        run: mypy app/ --ignore-missing-imports --no-error-summary

  # ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: celpip
          POSTGRES_PASSWORD: celpip
          POSTGRES_DB: celpip_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://celpip:celpip@localhost:5432/celpip_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: development
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Alembic heads check ───────────────────────────────────────────────────────
  alembic-check:
    name: Alembic heads check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: celpip
          POSTGRES_PASSWORD: celpip
          POSTGRES_DB: celpip_alembic_check
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://celpip:celpip@localhost:5432/celpip_alembic_check
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: development
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alembic upgrade head
        run: alembic upgrade head

      - name: Check for multiple heads (merge required)
        run: |
          HEADS=$(alembic heads | wc -l)
          echo "Found $HEADS Alembic head(s)"
          if [ "$HEADS" -gt 1 ]; then
            echo "ERROR: Multiple Alembic heads detected — run 'alembic merge heads' to fix."
            exit 1
          fi

  # ── Frontend type check ────────────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ── Frontend lint ─────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
