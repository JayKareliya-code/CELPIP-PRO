# ─── CELPIP Platform — Local Development Services ──────────────────────────────
# Usage:
#   docker compose up --build          — Start all services
#   docker compose up db redis         — Start only infrastructure
#   docker compose logs -f api worker  — Tail app logs
#
# Observability (S2-1):
#   Prometheus → http://localhost:9090
#   Grafana    → http://localhost:3001  (pre-loaded CELPIP dashboard)
#   Jaeger UI  → http://localhost:16686 (OTel tracing)

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     celpip
      POSTGRES_PASSWORD: celpip
      POSTGRES_DB:       celpip_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U celpip -d celpip_dev"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  10

  # ── Jaeger — OpenTelemetry collector + trace UI ──────────────────────────────
  # OTLP gRPC receiver: port 4317 (used by the API)
  # Trace UI:           http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver (API → Jaeger)
    healthcheck:
      test:     ["CMD-SHELL", "wget -qO- http://localhost:16686/ || exit 1"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── FastAPI App ───────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: ./apps/api/.env
    environment:
      DATABASE_URL:                postgresql+asyncpg://celpip:celpip@db:5432/celpip_dev
      REDIS_URL:                   redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test:     ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 15s

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  worker:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      -Q speaking,writing,mock_exam,writing_mock,reconciliation,celery,export,transcode
      --concurrency=2
    env_file: ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://celpip:celpip@db:5432/celpip_dev
      REDIS_URL:    redis://redis:6379/0
    volumes:
      - ./apps/api:/app
    depends_on:
      - api

  # ── Flower (Celery Monitor) ───────────────────────────────────────────────────
  # Basic auth required (S2-13). Set FLOWER_PASSWORD in .env.
  # In production, bind to internal VPC only — never expose 5555 publicly.
  flower:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
    command: >
      celery -A app.workers.celery_app flower
      --port=5555
      --basic_auth=admin:${FLOWER_PASSWORD:-changeme}
    ports:
      - "5555:5555"
    environment:
      REDIS_URL:       redis://redis:6379/0
      FLOWER_PASSWORD: ${FLOWER_PASSWORD:-changeme}
    depends_on:
      - redis

  # ── Celery Beat (periodic scheduler) ──────────────────────────────────────
  # Runs the Beat scheduler for cron-style tasks (e.g. nightly reconciliation,
  # queue-depth metrics polling).
  # Only one Beat instance must run at a time — do not scale this service.
  celery-beat:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://celpip:celpip@db:5432/celpip_dev
      REDIS_URL:    redis://redis:6379/0
    volumes:
      - ./apps/api:/app
    depends_on:
      - db
      - redis

  # ── Prometheus ────────────────────────────────────────────────────────────────
  # Scrapes GET /metrics from the API every 15 s.
  # UI: http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy

  # ── Grafana ───────────────────────────────────────────────────────────────────
  # Pre-loaded with Prometheus datasource + CELPIP dashboard.
  # UI: http://localhost:3001  (admin / admin on first login)
  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - ./infra/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./infra/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards-config/dashboards.yml:ro
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  db_data:
  prometheus_data:
  grafana_data:
